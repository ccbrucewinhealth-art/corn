<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>tacos login</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f4f6f9; margin:0; }
    .wrap { max-width:420px; margin:8vh auto; background:#fff; border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,.08); padding:24px; }
    h1 { margin:0 0 16px; font-size:22px; }
    .hint { color:#6c757d; margin-bottom:12px; }
    input { width:100%; box-sizing:border-box; margin:8px 0; padding:10px; border:1px solid #ced4da; border-radius:6px; }
    button { width:100%; border:none; background:#007bff; color:#fff; padding:10px; border-radius:6px; cursor:pointer; }
    pre { background:#f8f9fa; padding:8px; border-radius:6px; overflow:auto; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>corn / tacos</h1>
    <div class="hint">AdminLTE template mode (mlua driven)</div>
    <input id="username" placeholder="username" value="admin" />
    <input id="password" type="password" placeholder="password" value="admin123" />
    <button onclick="login()">登入</button>
    <p>POST API: <code>{{api_login_path}}</code></p>
    <pre id="out"></pre>
  </div>
  <script>
    async function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const out = document.getElementById('out');
      out.textContent = 'loading...';
      const resp = await fetch('{{api_login_path}}', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ username, password })
      });
      out.textContent = JSON.stringify(await resp.json(), null, 2);
    }
  </script>
</body>
</html>
