<section>
  <h2>Batch Job Form</h2>
  <form id="batch-job-form">
    <label>Batch Name <input type="text" name="name" required /></label><br />
    <label
      >Schedule
      <input
        type="text"
        name="schedule"
        placeholder="0 */5 * * * *"
        required /></label
    ><br />
    <label>Enabled <input type="checkbox" name="enabled" checked /></label
    ><br />
    <button type="submit">儲存</button>
  </form>
</section>
