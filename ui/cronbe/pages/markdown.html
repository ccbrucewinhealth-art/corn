<section>
  <h2>Markdown 管理</h2>
  <div style="display: flex; gap: 16px">
    <aside style="width: 30%">
      <h3>Tree</h3>
      <ul id="md-tree"></ul>
    </aside>
    <article style="width: 70%">
      <h3>Editor</h3>
      <textarea id="md-content" rows="16" style="width: 100%"></textarea>
      <div>
        <button id="btn-save">儲存</button>
        <button id="btn-new">新增</button>
        <button id="btn-del">刪除</button>
      </div>
    </article>
  </div>
</section>
